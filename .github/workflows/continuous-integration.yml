name: Continuous Integration With Github Actions

on:
  push:
    branches: 
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3.7.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven
        
    - name: Build and Run Tests
      working-directory: .
      run: |
        mvn clean verify -Dspring.profiles.active=prod

    - name: Docker Compose Build
      working-directory: .
      run: docker compose build

    - name: Push to Docker Hub Container Registry
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/ws2-api:latest ${{ secrets.DOCKER_USERNAME }}/ws2-api:${{ github.run_id }}

        docker push ${{ secrets.DOCKER_USERNAME }}/ws2-api:${{ github.run_id }}
        docker push ${{ secrets.DOCKER_USERNAME }}/ws2-api:latest
