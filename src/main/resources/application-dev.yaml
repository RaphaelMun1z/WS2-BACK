spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

spring-doc:
  paths-to-match: /**
  swagger-ui:
    use-root-path: true

server:
  port: 8080
  servlet:
    context-path: /api

cors:
  originPatterns: "*"